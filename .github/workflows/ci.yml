name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]

# Standalone build (hybrid CI): fm-sim builds its own packages. Its externals are
# MJCF model sources (SO-ARM, OpenArm, Unitree) — file-vendored, not colcon
# packages — so they are COLCON_IGNORE'd. The full integration build lives in
# fm-ros2.
jobs:
  build-test:
    name: build + test (humble)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          path: src/fm-sim

      - name: Import + mark externals
        run: |
          apt-get update && apt-get install -y python3-vcstool
          vcs import < src/fm-sim/fm-sim.repos
          # Externals are MJCF/file-only — not colcon packages. Keep them out.
          for d in external/*/; do touch "${d}COLCON_IGNORE"; done

      - name: Install ROS deps
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -y -r

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: colcon test
        run: |
          source /opt/ros/humble/setup.bash
          colcon test
          colcon test-result --verbose

  image:
    name: build + publish image (FROM fm-robot layer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR — to pull the private fm-robot base FROM and to push this
      # layer (the Dockerfile is FROM ghcr.io/first-motive/fm-robot:humble).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build multi-arch (arm64 + amd64). Publish to GHCR only on main — branch and
      # PR runs build to validate without pushing.
      - name: Build + publish the sim image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/first-motive/fm-sim:humble
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: smoke run.sh (native headless)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install tooling + ROS deps
        run: |
          apt-get update && apt-get install -y python3-vcstool
          source /opt/ros/humble/setup.bash
          vcs import < fm-sim.repos
          # Externals are MJCF/file-only (so_arm, openarm_mujoco, unitree_mujoco) —
          # not colcon packages. Keep them out so only the ament packages build.
          for d in external/*/; do touch "${d}COLCON_IGNORE"; done
          rosdep update
          rosdep install --from-paths . --ignore-src -y -r

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Launch headless, bounded
        run: |
          # Workspace pre-built above, so run.sh's incremental build is quick and the
          # bounded window covers the launch itself. The mock backend needs no sim
          # engine (no MuJoCo/Gazebo in CI), so it exercises run.sh end to end while
          # staying light. 124 = ran the full window (came up); 0 = clean exit.
          set +e
          timeout 90 ./run.sh --native --backend mock
          code=$?
          [ "$code" -eq 124 ] || [ "$code" -eq 0 ] || [ "$code" -eq 143 ]
