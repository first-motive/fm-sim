# Defaults for sim_loop. Override in your own copy — do not edit this file to
# change a run. Pass an override file with:
#   ros2 launch fm_sim_core sim.launch.py params_file:=/path/to/my.yaml
sim_loop:
  ros__parameters:
    model_path: ""    # MJCF path; empty loads the built-in 1-DOF fallback
    rate_hz: 100.0    # step + publish rate
